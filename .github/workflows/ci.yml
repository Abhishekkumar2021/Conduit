name: CI

on:
  push:
    branches:
      - main
      - "release/**"
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  workflow-lint:
    name: Lint GitHub Workflows
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Actionlint
        uses: rhysd/actionlint@v1

  dependency-review:
    name: Dependency Review (PR)
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Dependency Review
        uses: actions/dependency-review-action@v4

  python-packages:
    name: Python Tests (${{ matrix.package }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - package: domain
            test_path: packages/domain/tests
            cov_target: conduit.domain
            pythonpath: packages/domain/src
          - package: engine
            test_path: packages/engine/tests
            cov_target: conduit.engine
            pythonpath: packages/engine/src:packages/domain/src
          - package: runner
            test_path: runner/tests
            cov_target: conduit.runner
            pythonpath: runner/src:packages/engine/src:packages/domain/src
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e packages/domain[dev]
          python -m pip install -e packages/engine[dev]
          python -m pip install -e runner[dev]
          python -m pip install pytest-cov

      - name: Test with coverage gate
        run: |
          PYTHONPATH="${{ matrix.pythonpath }}" \
          python -m pytest "${{ matrix.test_path }}" \
            --cov="${{ matrix.cov_target }}" \
            --cov-report=term \
            --cov-report=xml:"coverage-${{ matrix.package }}.xml" \
            --cov-fail-under=90 \
            -q

      - name: Upload coverage xml
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.package }}
          path: coverage-${{ matrix.package }}.xml
          if-no-files-found: error
          retention-days: 14

  server-tests:
    name: Server Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: conduit
          POSTGRES_PASSWORD: conduit123
          POSTGRES_DB: conduit
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U conduit"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20
    env:
      CONDUIT_TEST_DB_URL: postgresql+asyncpg://conduit:conduit123@127.0.0.1:5432/conduit_test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install server dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e packages/domain[dev]
          python -m pip install -e packages/engine[dev]
          python -m pip install -e server
          python -m pip install pytest pytest-asyncio pytest-cov anyio

      - name: Wait for PostgreSQL
        run: |
          python - <<'PY'
          import socket, time, sys
          deadline = time.time() + 60
          while time.time() < deadline:
              try:
                  with socket.create_connection(("127.0.0.1", 5432), timeout=1):
                      print("postgres ready")
                      sys.exit(0)
              except OSError:
                  time.sleep(1)
          raise SystemExit("postgres not ready within 60s")
          PY

      - name: Run server tests with coverage gate
        run: |
          cd server
          PYTHONPATH=. python -m pytest tests \
            --cov=app \
            --cov-report=term \
            --cov-report=xml:coverage-server.xml \
            --cov-fail-under=90 \
            -q

      - name: Upload server coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-server
          path: server/coverage-server.xml
          if-no-files-found: error
          retention-days: 14

  console:
    name: Console Quality
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: console/package-lock.json

      - name: Install console dependencies
        working-directory: console
        run: npm ci

      - name: Lint console
        working-directory: console
        run: npm run lint

      - name: Test console (coverage)
        working-directory: console
        run: npm run test:coverage

      - name: Build console
        working-directory: console
        run: npm run build

      - name: Upload console build artifact
        uses: actions/upload-artifact@v4
        with:
          name: console-dist
          path: console/dist
          if-no-files-found: error
          retention-days: 14
