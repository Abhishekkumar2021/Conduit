name: CD

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      target_env:
        description: "Deployment target"
        required: true
        type: string
        default: "staging"

permissions:
  contents: read

concurrency:
  group: cd-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  validate-dispatch-input:
    name: Validate Dispatch Input
    runs-on: ubuntu-latest
    steps:
      - name: Skip validation for non-dispatch events
        if: github.event_name != 'workflow_dispatch'
        run: echo "Not a workflow_dispatch event; skipping input validation."

      - name: Validate target_env
        if: github.event_name == 'workflow_dispatch'
        run: |
          case "${{ github.event.inputs.target_env }}" in
            staging|production) ;;
            *)
              echo "Invalid target_env='${{ github.event.inputs.target_env }}'. Use 'staging' or 'production'."
              exit 1
              ;;
          esac

  verify-python:
    name: Verify Python Packages
    runs-on: ubuntu-latest
    needs:
      - validate-dispatch-input
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e packages/domain[dev]
          python -m pip install -e packages/engine[dev]
          python -m pip install -e runner[dev]
          python -m pip install pytest-cov

      - name: Test domain
        run: |
          PYTHONPATH=packages/domain/src python -m pytest packages/domain/tests \
            --cov=conduit.domain \
            --cov-report=term \
            --cov-fail-under=90 \
            -q

      - name: Test engine
        run: |
          PYTHONPATH=packages/engine/src:packages/domain/src python -m pytest packages/engine/tests \
            --cov=conduit.engine \
            --cov-report=term \
            --cov-fail-under=90 \
            -q

      - name: Test runner
        run: |
          PYTHONPATH=runner/src:packages/engine/src:packages/domain/src python -m pytest runner/tests \
            --cov=conduit.runner \
            --cov-report=term \
            --cov-fail-under=90 \
            -q

  verify-server:
    name: Verify Server
    runs-on: ubuntu-latest
    needs:
      - validate-dispatch-input
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: conduit
          POSTGRES_PASSWORD: conduit123
          POSTGRES_DB: conduit
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U conduit"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20
    env:
      CONDUIT_TEST_DB_URL: postgresql+asyncpg://conduit:conduit123@127.0.0.1:5432/conduit_test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e packages/domain[dev]
          python -m pip install -e packages/engine[dev]
          python -m pip install -e server
          python -m pip install pytest pytest-asyncio pytest-cov anyio

      - name: Wait for PostgreSQL
        run: |
          python - <<'PY'
          import socket, time, sys
          deadline = time.time() + 60
          while time.time() < deadline:
              try:
                  with socket.create_connection(("127.0.0.1", 5432), timeout=1):
                      print("postgres ready")
                      sys.exit(0)
              except OSError:
                  time.sleep(1)
          raise SystemExit("postgres not ready within 60s")
          PY

      - name: Test server
        run: |
          cd server
          PYTHONPATH=. python -m pytest tests \
            --cov=app \
            --cov-report=term \
            --cov-fail-under=90 \
            -q

  verify-console:
    name: Verify Console
    runs-on: ubuntu-latest
    needs:
      - validate-dispatch-input
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: console/package-lock.json

      - name: Install dependencies
        working-directory: console
        run: npm ci

      - name: Lint
        working-directory: console
        run: npm run lint

      - name: Test
        working-directory: console
        run: npm run test -- --run

      - name: Build
        working-directory: console
        run: npm run build

  build-artifacts:
    name: Build Release Artifacts
    runs-on: ubuntu-latest
    needs:
      - verify-python
      - verify-server
      - verify-console
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: console/package-lock.json

      - name: Build Python artifacts
        run: |
          python -m pip install --upgrade pip build
          mkdir -p dist/python
          python -m build packages/domain --sdist --wheel --outdir dist/python
          python -m build packages/engine --sdist --wheel --outdir dist/python
          python -m build runner --sdist --wheel --outdir dist/python
          python -m build server --sdist --wheel --outdir dist/python

      - name: Build console artifact
        run: |
          cd console
          npm ci
          npm run build
          cd ..
          mkdir -p dist/console
          tar -czf "dist/console/console-${GITHUB_SHA::7}.tar.gz" -C console/dist .

      - name: Generate checksums
        run: |
          cd dist
          sha256sum python/* console/* > SHA256SUMS

      - name: Upload release bundle
        uses: actions/upload-artifact@v4
        with:
          name: release-bundle-${{ github.sha }}
          path: dist
          if-no-files-found: error
          retention-days: 30

  release:
    name: Create GitHub Release
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    needs:
      - build-artifacts
    permissions:
      contents: write
    steps:
      - name: Download release bundle
        uses: actions/download-artifact@v4
        with:
          name: release-bundle-${{ github.sha }}
          path: dist

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/SHA256SUMS
            dist/python/*
            dist/console/*

  deploy-staging:
    name: Deploy Staging
    if: >
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.target_env == 'staging')
    runs-on: ubuntu-latest
    needs:
      - build-artifacts
    environment:
      name: ${{ vars.STAGING_ENVIRONMENT || 'staging' }}
    env:
      DEPLOY_WEBHOOK_URL: ${{ secrets.DEPLOY_WEBHOOK_URL }}
    concurrency:
      group: deploy-staging
      cancel-in-progress: false
    steps:
      - name: Download release bundle
        uses: actions/download-artifact@v4
        with:
          name: release-bundle-${{ github.sha }}
          path: dist

      - name: Verify deployment secret
        run: |
          if [ -z "${DEPLOY_WEBHOOK_URL}" ]; then
            echo "Missing DEPLOY_WEBHOOK_URL secret in staging environment"
            exit 1
          fi

      - name: Trigger staging deployment webhook
        run: |
          curl -fsS -X POST "${DEPLOY_WEBHOOK_URL}" \
            -H "Content-Type: application/json" \
            -d "{\"sha\":\"${GITHUB_SHA}\",\"environment\":\"staging\"}"

  deploy-production-tag:
    name: Deploy Production (Tag)
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    needs:
      - build-artifacts
      - release
    permissions:
      contents: read
      id-token: write
    environment:
      name: ${{ vars.PRODUCTION_ENVIRONMENT || 'production' }}
    env:
      DEPLOY_WEBHOOK_URL: ${{ secrets.DEPLOY_WEBHOOK_URL }}
    concurrency:
      group: deploy-production
      cancel-in-progress: false
    steps:
      - name: Download release bundle
        uses: actions/download-artifact@v4
        with:
          name: release-bundle-${{ github.sha }}
          path: dist

      - name: Verify deployment secret
        run: |
          if [ -z "${DEPLOY_WEBHOOK_URL}" ]; then
            echo "Missing DEPLOY_WEBHOOK_URL secret in production environment"
            exit 1
          fi

      - name: Trigger production deployment webhook
        run: |
          curl -fsS -X POST "${DEPLOY_WEBHOOK_URL}" \
            -H "Content-Type: application/json" \
            -d "{\"sha\":\"${GITHUB_SHA}\",\"environment\":\"production\"}"

  deploy-production-manual:
    name: Deploy Production (Manual)
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.target_env == 'production'
    runs-on: ubuntu-latest
    needs:
      - build-artifacts
    permissions:
      contents: read
      id-token: write
    environment:
      name: ${{ vars.PRODUCTION_ENVIRONMENT || 'production' }}
    env:
      DEPLOY_WEBHOOK_URL: ${{ secrets.DEPLOY_WEBHOOK_URL }}
    concurrency:
      group: deploy-production
      cancel-in-progress: false
    steps:
      - name: Download release bundle
        uses: actions/download-artifact@v4
        with:
          name: release-bundle-${{ github.sha }}
          path: dist

      - name: Verify deployment secret
        run: |
          if [ -z "${DEPLOY_WEBHOOK_URL}" ]; then
            echo "Missing DEPLOY_WEBHOOK_URL secret in production environment"
            exit 1
          fi

      - name: Trigger production deployment webhook
        run: |
          curl -fsS -X POST "${DEPLOY_WEBHOOK_URL}" \
            -H "Content-Type: application/json" \
            -d "{\"sha\":\"${GITHUB_SHA}\",\"environment\":\"production\"}"
